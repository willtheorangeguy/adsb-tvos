name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  tvos-build:
    runs-on: macos-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck tvOS
        run: npm run typecheck --workspace @adsb/tvos

      - name: Test tvOS
        run: npm run test --workspace @adsb/tvos

  screenshot:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace @adsb/web

      - name: Install Playwright and Chromium
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Start preview server
        run: npm run preview --workspace @adsb/web &

      - name: Wait for preview server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Take Apple TV preview screenshot
        run: node .github/scripts/screenshot.mjs

      - name: Upload screenshot
        uses: actions/upload-artifact@v7
        with:
          name: tvos-ui-preview
          path: screenshots/
          retention-days: 30
